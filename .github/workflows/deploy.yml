name: Deploy to GitHub Pages

on:
  # Ejecutar automaticamente - horarios optimizados para capturar pronosticos
  # ANTES de que arranquen los partidos en cada region
  schedule:
    - cron: '0 10 * * *'  # 06:00 VEN - Build matutino
    - cron: '0 14 * * *'  # 10:00 VEN - Pre-partidos Europa (16:45-19:00 UTC)
    - cron: '0 16 * * *'  # 12:00 VEN - Captura partidos Europa tarde
    - cron: '0 20 * * *'  # 16:00 VEN - Pre-partidos Americas (22:00-02:00 UTC)
    - cron: '0 23 * * *'  # 19:00 VEN - Captura partidos Americas nocturnos
    - cron: '0 2 * * *'   # 22:00 VEN - Ultimo build del dia
  # Tambien al hacer push
  push:
    branches: [master]
  # Permitir ejecucion manual desde GitHub
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build blog (noticias + scores + pronosticos)
        run: python main.py build

      - name: Send predictions to Telegram
        if: env.TELEGRAM_BOT_TOKEN != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py telegram

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: output
      - id: deployment
        uses: actions/deploy-pages@v4
