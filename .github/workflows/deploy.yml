name: Deploy to GitHub Pages

on:
  # Ejecutar automaticamente - incluye 10AM Venezuela (14:00 UTC)
  schedule:
    - cron: '0 14 * * *'  # 10:00 AM Venezuela (diario)
    - cron: '0 6,10,18,22 * * *'  # Actualizaciones adicionales cada ~4h UTC
  # Tambien al hacer push
  push:
    branches: [master]
  # Permitir ejecucion manual desde GitHub
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build blog (noticias + scores + pronosticos)
        run: python main.py build

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: output
      - id: deployment
        uses: actions/deploy-pages@v4
